<!DOCTYPE html>
<html>
<head>
  <title>Stylish Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calculator">

  <input type="text" class="display" placeholder="0" readonly>

  <div class="buttons">
    <button class="op">C</button>
    <button class="op">/</button>
    <button class="op">*</button>
    <button class="op">-</button>

    <button>7</button>
    <button>8</button>
    <button>9</button>
    <button class="op">+</button>

    <button>4</button>
    <button>5</button>
    <button>6</button>
    <button class="equal">=</button>

    <button>1</button>
    <button>2</button>
    <button>3</button>

    <button class="zero">0</button>
    <button>.</button>
  </div>

</div>

</body>
</html>
