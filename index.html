<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>College ID Card</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .id-card {
            width: 300px;
            height: 480px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            overflow: hidden;
            text-align: center;
        }

        .header {
            background-color: #2c3e50;
            color: white;
            padding: 15px;
        }

        .header h2 {
            margin: 0;
            font-size: 20px;
        }

        .photo {
            margin: 20px 0;
        }

        .photo img {
            width: 100px;
            height: 120px;
            border-radius: 10px;
            border: 2px solid #ddd;
        }

        .details {
            padding: 10px;
            text-align: left;
        }

        .details p {
            margin: 8px 0;
            font-size: 14px;
        }

        .label {
            font-weight: bold;
        }

        .footer {
            background-color: #2c3e50;
            color: white;
            padding: 10px;
            font-size: 12px;
            position: absolute;
            width: 300px;
            bottom: 0;
        }
    </style>
</head>
<body>

<div class="id-card">
    <div class="header">
        <h2>BITSVIZAG</h2>
        <p>Student ID Card</p>
    </div>
	<img src="https://universitykart.b-cdn.net/Content/upload/admin/1kz05p3y.nw3.png" id="img" style="width: 250px; height: 75px;">
    <div class="photo">
        <img src="images/img.jpeg" alt="profile photo">

    <div class="details">
        <p><span class="label">Name:</span> pratyusha</p>
        <p><span class="label">ID No:</span> 23NR1A05H0</p>
        <p><span class="label">Course:</span> B.Tech</p>
        <p><span class="label">Branch:</span> CSE</p>
        <p><span class="label">Valid Till:</span> 2027</p>
    </div>

    
</div>

</body>
</html>
